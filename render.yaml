services:
  - type: web
    name: techsolutions-erp
    env: python
    pythonVersion: 3.12.3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --worker-class sync --workers 2 --timeout 120 --access-logfile -
    releaseCommand: flask db upgrade
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: techsolutions-erp-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "True"

databases:
  - name: techsolutions-erp-db
    databaseName: techsolutions_erp
    plan: free
