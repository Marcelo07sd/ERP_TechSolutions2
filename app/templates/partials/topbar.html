<header class="ns-topbar">
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-sm btn-light border d-none d-lg-inline-flex" id="nsBtnCollapse" title="Contraer menú">
      <i class="bi bi-layout-sidebar"></i>
    </button>
    <button class="btn btn-sm btn-light border d-lg-none" id="nsBtnMobileToggle">
      <i class="bi bi-list"></i>
    </button>

    <div class="ns-topbar-search d-none d-md-block">
      <i class="bi bi-search"></i>
      <input type="text" class="form-control" placeholder="Buscar productos, ventas, clientes…">
    </div>
  </div>

  <div class="d-flex align-items-center gap-2">
    <button class="ns-topbar-icon-btn" title="Notificaciones">
      <i class="bi bi-bell"></i>
      <span class="ns-dot"></span>
    </button>
    <button class="ns-topbar-icon-btn" title="Ayuda">
      <i class="bi bi-question-circle"></i>
    </button>

    <div class="dropdown">
      <button class="btn d-flex align-items-center gap-2 border-0 bg-transparent" data-bs-toggle="dropdown">
        <div class="ns-avatar">
          {{ current_user.nombre[0] }}{{ current_user.apellido[0] }}
        </div>
        <div class="d-none d-md-block text-start">
          <div class="fw-semibold" style="font-size:0.82rem;">{{ current_user.nombre_completo }}</div>
          <div class="text-muted" style="font-size:0.72rem;">{{ current_user.rol.nombre }}</div>
        </div>
        <i class="bi bi-chevron-down text-muted" style="font-size:0.7rem;"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
      </ul>
    </div>
  </div>
</header>
